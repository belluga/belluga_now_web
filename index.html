  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background-color: var(--bootstrap-background);
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bootstrap-background);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.35s ease, visibility 0.35s ease;
      z-index: 9999;
    }

    #splash-screen.is-hiding {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #splash-logo-container {
      position: relative;
      width: 220px;
      height: 160px;
    }

    .splash-logo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #splash-logo-background {
      opacity: 0.3;
    }

    #splash-logo-foreground {
      mask-image: linear-gradient(to right, transparent 20%, black 50%, transparent 80%);
      mask-size: 200% 100%;
      animation: shimmer-animation 2s infinite linear;
    }

    @keyframes shimmer-animation {
      from {
        mask-position: 150% 0;
      }

      to {
        mask-position: -50% 0;
      }
    }

    :root {
      --bootstrap-background: #4fa0e3;
      --branding-primary: #4fa0e3;
      --branding-on-primary: #ffffff;
      --branding-shadow: rgba(255, 255, 255, 0.24);
      --branding-progress-track: rgba(255, 255, 255, 0.18);
      --branding-progress-border: rgba(255, 255, 255, 0.14);
      --branding-progress-fill: #ffffff;
      --branding-progress-text: #0f172a;
    }

    #progress-wrapper {
      margin-top: 32px;
      width: 240px;
    }

    .progress-bar__container {
      width: 100%;
      height: 1.5rem;
      border-radius: 0.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.5s;
      will-change: transform;
      box-shadow: 0 10px 30px var(--branding-shadow);
      border: 1px solid var(--branding-progress-border);
      background: var(--branding-progress-track);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .progress-bar {
      position: absolute;
      height: 100%;
      width: 100%;
      content: "";
      background-color: var(--branding-progress-fill);
      top: 0;
      bottom: 0;
      left: 0;
      border-radius: inherit;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--branding-progress-text);
      font-family: sans-serif;
      transform: translateX(-100%);
      transition: transform 0.6s ease-in-out;
    }

    .progress-bar__text {
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>

<script>
  const FALLBACK_SPLASH_LOGOS = {
    light: 'splash/img/light-4x.png',
    dark: 'splash/img/dark-4x.png',
  };

  const FIXED_BRANDING_LOGOS = {
    light: '/logo-light.png',
    dark: '/logo-dark.png',
  };

  function extractBrandingPayload(rawBranding) {
    if (
      rawBranding &&
      typeof rawBranding === 'object' &&
      rawBranding.data &&
      typeof rawBranding.data === 'object'
    ) {
      return rawBranding.data;
    }
    return rawBranding;
  }

  function normalizeHexColor(rawColor) {
    if (typeof rawColor !== 'string') {
      return null;
    }

    let value = rawColor.trim();
    if (!value) {
      return null;
    }

    if (value.startsWith('#')) {
      value = value.slice(1);
    }

    if (!/^[0-9a-fA-F]{6}$/.test(value)) {
      return null;
    }

    return `#${value.toUpperCase()}`;
  }

  function hexToRgb(hexColor) {
    const normalized = normalizeHexColor(hexColor);
    if (!normalized) {
      return null;
    }

    return {
      r: Number.parseInt(normalized.slice(1, 3), 16),
      g: Number.parseInt(normalized.slice(3, 5), 16),
      b: Number.parseInt(normalized.slice(5, 7), 16),
    };
  }

  function relativeLuminance(rgbColor) {
    const channel = (value) => {
      const normalized = value / 255;
      return normalized <= 0.03928
        ? normalized / 12.92
        : Math.pow((normalized + 0.055) / 1.055, 2.4);
    };

    return (
      0.2126 * channel(rgbColor.r) +
      0.7152 * channel(rgbColor.g) +
      0.0722 * channel(rgbColor.b)
    );
  }

  function isLightColor(hexColor) {
    const rgbColor = hexToRgb(hexColor);
    if (!rgbColor) {
      return false;
    }

    return relativeLuminance(rgbColor) >= 0.55;
  }

  function withAlpha(hexColor, alpha) {
    const rgbColor = hexToRgb(hexColor);
    if (!rgbColor) {
      return null;
    }

    const clamped = Math.max(0, Math.min(1, alpha));
    return `rgba(${rgbColor.r}, ${rgbColor.g}, ${rgbColor.b}, ${clamped.toFixed(3)})`;
  }

  function applyBootstrapPalette(rawPrimaryColor) {
    const primaryColor = normalizeHexColor(rawPrimaryColor);
    if (!primaryColor) {
      return;
    }

    const lightBackground = isLightColor(primaryColor);
    const onPrimary = lightBackground ? '#0F172A' : '#FFFFFF';
    const progressText = lightBackground ? '#FFFFFF' : '#0F172A';
    const root = document.documentElement;

    root.style.setProperty('--bootstrap-background', primaryColor);
    root.style.setProperty('--branding-primary', primaryColor);
    root.style.setProperty('--branding-on-primary', onPrimary);
    root.style.setProperty(
      '--branding-shadow',
      withAlpha(onPrimary, lightBackground ? 0.18 : 0.24),
    );
    root.style.setProperty(
      '--branding-progress-track',
      withAlpha(onPrimary, lightBackground ? 0.12 : 0.18),
    );
    root.style.setProperty(
      '--branding-progress-border',
      withAlpha(onPrimary, lightBackground ? 0.12 : 0.14),
    );
    root.style.setProperty('--branding-progress-fill', onPrimary);
    root.style.setProperty('--branding-progress-text', progressText);
  }

  function setElementImageSource(elementId, src, fallbackSrc) {
    const element = document.getElementById(elementId);
    if (!element || !src) {
      return;
    }

    element.onerror = function handleError() {
      if (fallbackSrc && element.dataset.fallbackApplied !== 'true') {
        element.dataset.fallbackApplied = 'true';
        element.src = fallbackSrc;
        return;
      }

      element.onerror = null;
    };

    element.dataset.fallbackApplied = 'false';
    element.src = src;
  }

  function resolveBootstrapBrightness(brandingPayload, fallbackBrightness) {
    const configuredBrightness =
      brandingPayload?.theme_data_settings?.brightness_default;
    if (configuredBrightness === 'dark') {
      return 'dark';
    }
    if (configuredBrightness === 'light') {
      return 'light';
    }
    return fallbackBrightness === 'dark' ? 'dark' : 'light';
  }

  function resolveSplashLogoSource(brandingPayload, brightness) {
    const variant = brightness === 'dark' ? 'dark' : 'light';
    const payloadLogo =
      variant === 'dark'
        ? brandingPayload?.main_logo_dark_url
        : brandingPayload?.main_logo_light_url;

    if (typeof payloadLogo === 'string' && payloadLogo.trim().length > 0) {
      return payloadLogo.trim();
    }

    return variant === 'dark'
      ? FIXED_BRANDING_LOGOS.dark
      : FIXED_BRANDING_LOGOS.light;
  }

  function applySplashLogo(rawBranding, fallbackBrightness) {
    const brandingPayload = extractBrandingPayload(rawBranding);
    const brightness = resolveBootstrapBrightness(
      brandingPayload,
      fallbackBrightness,
    );
    const fallbackLogo =
      brightness === 'dark'
        ? FALLBACK_SPLASH_LOGOS.dark
        : FALLBACK_SPLASH_LOGOS.light;
    const logoSource = resolveSplashLogoSource(brandingPayload, brightness);

    setElementImageSource('splash-logo-background', logoSource, fallbackLogo);
    setElementImageSource('splash-logo-foreground', logoSource, fallbackLogo);
  }

  window.addEventListener('DOMContentLoaded', (event) => {
    // Host-based routing safety (pre-Flutter).
    // - Tenant hosts must never render landlord routes even via direct navigation.
    // - Landlord host must never render tenant-only routes even via direct navigation.
    const landlordHostRaw = window.__LANDLORD_HOST__;
    const hostname = window.location.hostname.toLowerCase();
    const pathname = window.location.pathname || '/';
    const landlordHost =
      typeof landlordHostRaw === 'string' && landlordHostRaw.trim().length > 0
        ? landlordHostRaw.trim().toLowerCase()
        : null;

    const isLocalDebugHost =
      hostname === 'localhost' ||
      hostname === '127.0.0.1' ||
      hostname === '[::1]';
    const systemPreferredBrightness =
      window.matchMedia &&
      window.matchMedia('(prefers-color-scheme: dark)').matches
        ? 'dark'
        : 'light';

    applySplashLogo(null, systemPreferredBrightness);

    // Fail closed for real hosts. Local debug/integration runners serve the app from
    // localhost and do not perform the build-time landlord-host injection.
    if (landlordHost == null && !isLocalDebugHost) {
      console.error('[belluga_now] Missing required window.__LANDLORD_HOST__ injection. Refusing to start.');

      applyBootstrapPalette('#111827');
      const label = window.__appProgressLabel;
      const progress = window.__appProgressUpdate;
      if (typeof progress === 'function') progress(100);
      if (typeof label === 'function') {
        label('Config error: missing LANDLORD host injection.');
      }
      return;
    }

    if (landlordHost == null && isLocalDebugHost) {
      return;
    }

    const isTenantHost =
      landlordHost != null &&
      hostname.endsWith('.' + landlordHost) &&
      hostname !== landlordHost;
    const isLandlordHost = landlordHost != null && hostname === landlordHost;

    if (isTenantHost && pathname.startsWith('/landlord')) {
      window.location.replace('/');
      return;
    }

    if (isTenantHost && pathname.startsWith('/home')) {
      window.location.replace('/');
      return;
    }

    if (isLandlordHost && pathname.startsWith('/home')) {
      window.location.replace('/admin');
      return;
    }

    if (isLandlordHost && pathname.startsWith('/landlord')) {
      window.location.replace('/admin');
      return;
    }

    const startFlutter = () => {
      if (window.__bellugaFlutterBootstrapped) return;
      window.__bellugaFlutterBootstrapped = true;
      const script = document.createElement('script');
      const v = window.__WEB_BUILD_SHA__;
      const suffix = typeof v === 'string' && v.trim().length > 0 ? `?v=${encodeURIComponent(v.trim())}` : '';
      script.src = `flutter_bootstrap.js${suffix}`;
      script.async = true;
      document.body.appendChild(script);
    };

    const applyBranding = (branding) => {
      const brandingPayload = extractBrandingPayload(branding);
      if (!brandingPayload) return;

      document.title = brandingPayload.name || document.title;
      const primarySeedColor = normalizeHexColor(
        brandingPayload.theme_data_settings?.primary_seed_color,
      );

      if (primarySeedColor) {
        applyBootstrapPalette(primarySeedColor);
      }

      applySplashLogo(brandingPayload, systemPreferredBrightness);
    };

    (async function () {
      // Always fetch from the current host/origin.
      // This keeps local dev deterministic and allows host-based tenant resolution on Web.
      let resolvedBranding = null;
      const environmentUrl = '/api/v1/environment';

      try {
        const response = await fetch(environmentUrl);
        if (response.ok) {
          const freshBranding = await response.json();
          resolvedBranding = freshBranding;
          applyBranding(freshBranding);
        }
      } catch (error) {
        // Ignore network failures; Flutter will fall back.
      } finally {
        // Persist the resolved payload on the global scope so Flutter can read it even if it
        // attaches the `brandingReady` listener after this event is dispatched.
        window.__brandingPayload = extractBrandingPayload(resolvedBranding);

        window.dispatchEvent(new CustomEvent('brandingReady', { detail: window.__brandingPayload }));
      }
    })();

    // Bootstrap Flutter after pre-route safety checks are done.
    startFlutter();
  });
</script>
</head>

<body>
  <div id="splash-screen" class="splash">
    <div id="splash-content">
      <div id="splash-logo-container">
        <img id="splash-logo-background" src="/logo-light.png" class="splash-logo" alt="Logo background" />
        <img id="splash-logo-foreground" src="/logo-light.png" class="splash-logo" alt="Logo foreground" />
      </div>
      <div id="progress-wrapper">
          <div class="progress-bar__container">
            <div class="progress-bar" id="progress-bar">
              <span class="progress-bar__text" id="progress-text">Iniciando...</span>
            </div>
          </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');

      function updateProgress(percent) {
        if (!progressBar) return;
        const clamped = Math.max(0, Math.min(100, percent));
        const translate = clamped - 100; // start at -100%, end at 0%
        progressBar.style.transform = `translateX(${translate}%)`;
      }

      function setProgressLabel(label) {
        if (progressText) {
          progressText.textContent = label;
        }
      }

      window.__appProgressUpdate = updateProgress;
      window.__appProgressLabel = setProgressLabel;
    })();
  </script>

  <script>
    // Remove splash when Flutter is visible.
    // Primary signal: `flutter-first-frame`.
    // Fallback signal: Flutter host nodes become available but the first-frame
    // event is missed by the browser/runtime.
    (function () {
      const flutterHostSelectors = 'flt-glass-pane, flt-scene-host, flutter-view';
      let splashHideScheduled = false;
      let splashRemoved = false;

      function removeSplash() {
        if (splashRemoved) {
          return;
        }
        splashRemoved = true;
        const splash = document.getElementById('splash-screen');
        if (!splash) {
          return;
        }
        splash.classList.add('is-hiding');
        window.setTimeout(function () {
          splash.remove();
        }, 360);
      }

      function scheduleSplashRemoval() {
        if (splashHideScheduled || splashRemoved) {
          return;
        }
        splashHideScheduled = true;
        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(function () {
            window.setTimeout(removeSplash, 80);
          });
        });
      }

      function tryScheduleSplashRemovalFromDom() {
        if (!document.querySelector(flutterHostSelectors)) {
          return false;
        }
        scheduleSplashRemoval();
        return true;
      }

      window.addEventListener('flutter-first-frame', scheduleSplashRemoval, { once: true });

      if (tryScheduleSplashRemovalFromDom()) {
        return;
      }

      const observer = new MutationObserver(function () {
        if (tryScheduleSplashRemovalFromDom()) {
          observer.disconnect();
        }
      });

      observer.observe(document.documentElement, { childList: true, subtree: true });

      // Keep observer bounded. If Flutter host nodes never appear, keep splash
      // visible to communicate app is not ready.
      window.setTimeout(function () {
        observer.disconnect();
        tryScheduleSplashRemovalFromDom();
      }, 20000);
    })();
  </script>
</body>
